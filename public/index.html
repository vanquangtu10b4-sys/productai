<!DOCTYPE html>
<html>
<head>
    <title>AI Product Description Generator</title>

    <style>

        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 500px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #5b5bd6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .result {
            margin-top: 30px;
            background: #f1f1f1;
            padding: 20px;
            border-radius: 5px;
            min-height: 60px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>AI Product Description Generator</h2>

        <input id="product" placeholder="Enter product name">

        <button onclick="generate()">Generate Description</button>

        <div class="result" id="result"></div>

    </div>

    <script>

        async function generate() {

            const product = document.getElementById("product").value;

            const res = await fetch("/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ product })
            });

            const data = await res.json();

            document.getElementById("result").innerText = data.text;

        }

    </script>

</body>
</html>
